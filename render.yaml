services:
  - type: web
    name: cricket-dashboard
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server-cricket.js
    healthCheckPath: /api/health
    autoDeploy: true

  - type: web
    name: other-sports-dashboard
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server-other-sports.js
    healthCheckPath: /api/health
    autoDeploy: true
