<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vipul's Sports Dashboard</title>
<style>
:root{--bg:#020817;--panel:#071226;--line:#12345b;--text:#f8fafc;--muted:#cbd5e1;--green:#00ff85;--blue:#2563ff;--cyan:#00e5ff;--orange:#ff7b00;--red:#ff3b5c;--purple:#8b5cf6;--yellow:#ffd43b}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,Segoe UI,Arial,sans-serif}
.page{max-width:1600px;margin:auto;padding:6px 8px;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
.topbar,.brand,.actions,.score-row,.stat,.cards,.timer,.match-row,.filter-bar{display:flex;align-items:center}
.topbar{justify-content:space-between;margin-bottom:5px}
.brand{gap:12px}.logo{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,#2563ff,#00e5ff);display:grid;place-items:center;font-weight:950}
.title{font-size:20px;font-weight:950;letter-spacing:-.04em}.subtitle{font-size:8px;color:var(--muted)}
.actions{gap:8px}.status,.btn,.select{border:1px solid var(--line);border-radius:12px;padding:8px 12px;font-weight:950;font-size:10.4px}
.status{background:#04111f;color:var(--green)}.status.warn{color:var(--orange)}.status.bad{color:var(--red)}
.star-legend{color:#dbeafe;white-space:nowrap;font-weight:950}.star-symbol{display:inline-flex;margin-left:4px;color:var(--green);font-size:17.6px;font-weight:950;text-shadow:0 0 9px #00ff8588;vertical-align:middle;line-height:1}
.btn{background:#1d4ed8;color:#fff;cursor:pointer}.select{min-width:260px;background:#071226;color:#fff;border:3px solid var(--yellow);box-shadow:0 0 0 3px #ffb00022,0 0 22px #ffb00080}
.hero{height:clamp(230px,32vh,290px);border:1px solid var(--line);border-radius:18px;overflow:hidden;margin-bottom:5px;background:linear-gradient(rgba(0,0,0,.25),rgba(0,0,0,.45)),url('./stadium.png') center/cover no-repeat}
.hero-grid{height:100%;display:grid;grid-template-columns:1fr .9fr}.hero-left,.hero-right{padding:12px 16px;background:rgba(0,0,0,.34);overflow:hidden}
.eyebrow{font-size:15.2px;color:var(--green);font-weight:950}.event-title{font-size:23.2px;line-height:1.02;margin:8px 0;font-weight:950;letter-spacing:-.04em}
.hero-main{display:inline-block;background:rgba(4,17,31,.84);border:1px solid #ffffff22;border-radius:12px;padding:7px 11px;font-size:16px;font-weight:950;max-width:100%}
.score-title{font-weight:950;margin-bottom:5px}.scoreboard{display:grid;gap:6px}.score-row{justify-content:space-between;gap:10px;border:1px solid #ffffff22;border-radius:13px;padding:7px 11px;background:linear-gradient(135deg,#ff007f88,#003dcb88)}
.score-row b,.score-row span{font-size:17.6px;font-weight:950;color:#fff}.score-row span{margin-left:auto;min-width:72px;text-align:right}.score-row small{font-size:8.8px;font-weight:950;color:#fff}
.team-football{background:linear-gradient(135deg,#0891b2,#1d4ed8)!important}.team-tennis{background:linear-gradient(135deg,#84cc16,#16a34a)!important}
.tennis-score-table{border:1px solid #ffffff28;border-radius:13px;overflow:hidden;background:rgba(4,17,31,.72)}
.tennis-score-head,.tennis-score-player{display:grid;grid-template-columns:minmax(150px,1fr) repeat(var(--sets,1),48px) var(--point-col,0);align-items:center;gap:5px;padding:5px 7px}
.tennis-score-head{background:#00000044;color:#cbd5e1;font-size:7.2px;font-weight:950;text-transform:uppercase;letter-spacing:.04em}
.tennis-score-player{border-top:1px solid #ffffff18}
.tennis-score-player.match-winner{background:linear-gradient(90deg,#00ff8526,#1d4ed826)}
.tennis-score-player.match-winner .tennis-player-name{color:#00ff85}
.tennis-player-name{min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:11.2px;font-weight:950;color:#fff}
.tennis-set-cell,.tennis-sets-won{display:grid;place-items:center;min-height:32px;border-radius:9px;background:#0b172d;color:#fff;font-size:13.6px;font-weight:950;border:1px solid #ffffff18}
.tennis-set-cell.set-leader{background:#00ff8524;border-color:#00ff85;color:#00ff85}
.tennis-set-cell.current-set{box-shadow:inset 0 0 0 2px #ffd43b77}
.tennis-sets-won{background:#1d4ed833;border-color:#60a5fa;color:#dbeafe}
.stats{display:grid;gap:5px;margin-top:6px}.stat{justify-content:space-between;border:1px solid #ffffff22;border-radius:11px;padding:5px 10px;background:rgba(4,17,31,.86)}
.stat small{font-size:10.4px;color:var(--muted);font-weight:950}.stat b{font-size:10.4px;text-align:right}
.cards{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:5px;margin-bottom:5px}.cards.football-cards,.cards.tennis-cards{grid-template-columns:1.1fr .9fr}.card{border:1px solid var(--line);border-radius:15px;background:rgba(4,17,31,.95);padding:8px 11px;min-height:52px;overflow:hidden}.card small{font-size:10.4px;color:var(--muted);font-weight:950;margin-right:6px}.card b{font-size:12.8px}
.green{border-color:#00ff85!important}.blue{border-color:#2563ff!important}.orange{border-color:#ff7b00!important}.purple{border-color:#8b5cf6!important}.red{border-color:#ff3b5c!important}
.panel{border:1px solid var(--line);border-radius:18px;background:rgba(4,17,31,.94);overflow:hidden;display:flex;flex-direction:column;flex:1;min-height:0}
.panel-head{padding:7px 12px;border-bottom:1px solid var(--line)}.panel-title{font-size:15.2px;font-weight:950}
.section{padding:7px 10px;display:flex;flex-direction:column;flex:1;min-height:0}
.timer{justify-content:space-between;border:1px solid #00e5ff44;border-radius:14px;padding:7px 10px;margin-bottom:6px;background:#00e5ff12;position:relative;min-height:52px}
.timer:before{content:"NEXT";position:absolute;top:-8px;left:50%;transform:translateX(-50%);background:#04111f;color:var(--red);font-size:8.8px;font-weight:950;padding:2px 7px;border-radius:999px;border:1px solid #00e5ff55}
.timer b,.countdown{font-size:15.2px}.countdown{color:var(--green);font-weight:950}.timer small{font-weight:950;color:#dbeafe}
.filter-bar{gap:7px;margin-bottom:6px}.active-filter-label{padding:4px 8px;border-radius:999px;background:#00ff8518;border:1px solid #00ff8588;color:var(--green);font-size:7.2px;font-weight:950;white-space:nowrap}
.filters{display:flex;gap:5px;overflow-x:auto;min-width:0}.filter{border:1px solid #1d4ed8;background:#071226;color:white;border-radius:9px;padding:5px 10px;font-size:10.4px;font-weight:950;cursor:pointer;white-space:nowrap}.filter.active{background:linear-gradient(135deg,#1d4ed8,#00a6ff);border-color:#00ff85;box-shadow:0 0 0 2px #00ff8588}
.match-list{border:1px solid var(--line);border-radius:14px;overflow-y:auto;flex:1;min-height:0}.match-row{justify-content:space-between;gap:12px;min-height:62px;padding:7px 10px;border-bottom:1px solid var(--line);background:#03101d;cursor:pointer}.match-row.active{background:#0b2a4a;border-left:2px solid var(--cyan)}.match-row:last-child{border-bottom:0}
.match-row.finished-row{background:linear-gradient(90deg,#0b2a4a,#03101d)}
.result-line{display:inline-flex;align-items:center;gap:8px;color:#fff;font-weight:950}
.result-winner{color:#00ff85;font-size:0.84em}
.result-winner.football-winner{color:#fff}
.result-score{display:inline-flex;padding:2px 8px;border-radius:999px;background:#ffd43b;color:#1a1200;font-weight:950}
.result-method{color:#ffb000;font-weight:950}
.result-method.football-method{color:var(--green)}
.blink-result{animation:blinkResult 1.1s ease-in-out infinite}
@keyframes blinkResult{0%,100%{filter:brightness(1);opacity:1}50%{filter:brightness(1.8);opacity:.58}}
.match-row>div{min-width:0;max-width:calc(100% - 100px);overflow:hidden}.match-name{font-size:11.2px;font-weight:950;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.match-status{font-size:8px;color:var(--muted);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lineup-label{display:inline-flex;align-items:center;justify-content:center;min-width:64px;margin-right:8px;padding:4px 9px;border-radius:999px;border:2px solid #ffd43b;background:#3a2d00;color:#ffd43b;font-size:.82em;font-weight:950;vertical-align:middle;letter-spacing:.02em;box-shadow:0 0 12px #ffd43b55}
.rank-badge{display:inline-flex;align-items:center;justify-content:center;margin-right:5px;padding:1px 6px;border-radius:999px;background:#ffd43b;color:#1a1200;border:1px solid #fff1a8;font-size:.72em;font-weight:950;vertical-align:middle;box-shadow:0 0 10px #ffd43b66}
.country-badge{display:inline-flex;margin-left:6px;padding:1px 6px;border-radius:999px;border:1px solid #38bdf899;background:#38bdf81f;color:#bae6fd;font-size:.68em;font-weight:950;vertical-align:middle}
.star-tag{display:inline-flex;align-items:center;gap:4px;margin-left:7px;padding:2px 7px;border-radius:999px;border:1px solid #00ff8599;background:#00ff8520;color:#00ff85;font-size:1.04em;font-weight:950;vertical-align:middle}
.pill{border-radius:999px;padding:6px 10px;font-weight:950;font-size:8px;background:#0b172d}.live{color:var(--green)}.upcoming{color:var(--orange)}.finished{color:#ff8094}
.footer{display:flex;justify-content:space-between;margin-top:4px;color:#94a3b8;font-size:7.2px}.footer-left{display:flex;gap:10px;align-items:center}
@media(max-width:900px){.page{height:auto;overflow:auto}.topbar,.actions{align-items:flex-start;flex-direction:column}.select{width:100%}.hero{height:auto}.hero-grid,.cards{grid-template-columns:1fr}.event-title{font-size:19.2px}.score-row b,.score-row span{font-size:14.4px}}
@media(max-width:600px){
  body{overflow-x:hidden}.page{width:100%;padding:5px;gap:0}.topbar{gap:6px;margin-bottom:4px}.brand{gap:8px}.logo{width:30px;height:30px;border-radius:8px}.title{font-size:14.4px;letter-spacing:0}.subtitle{font-size:7.2px}
  .actions{width:100%;gap:5px}.status,.btn,.select{width:100%;min-width:0;padding:7px 10px;border-radius:10px;font-size:8.8px}.btn{font-size:0}.btn:before{content:"↻";font-size:10.4px}.select{font-size:8.8px;border-width:2px}
  .hero{border-radius:12px;margin-bottom:4px}.hero-left,.hero-right{padding:8px}.hero-grid{gap:0}.eyebrow{font-size:9.6px}.event-title{font-size:14.4px;line-height:1.08;margin:5px 0;letter-spacing:0}.hero-main{font-size:10.4px;padding:5px 7px;border-radius:9px}.score-title{font-size:8.8px;margin-bottom:4px}
  .scoreboard{gap:4px}.score-row{gap:6px;padding:6px 7px;border-radius:10px}.score-row b{font-size:11.2px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.score-row span{font-size:12px;min-width:34px}.score-row small{display:none}
  .tennis-score-table{border-radius:10px}.tennis-score-head,.tennis-score-player{grid-template-columns:minmax(0,1fr) repeat(var(--sets,1),34px) var(--point-col-mobile,0)!important;gap:3px;padding:4px}.tennis-score-head{font-size:6.4px;letter-spacing:0}.tennis-player-name{font-size:9.6px}.tennis-set-cell,.tennis-sets-won{min-height:28px;border-radius:7px;font-size:10.4px}.country-badge{margin-left:4px;padding:1px 4px;font-size:.62em}.rank-badge{padding:1px 4px}
  .stats{gap:4px;margin-top:4px}.stat{padding:5px 7px;border-radius:9px}.stat small,.stat b{font-size:8px}.stat b{max-width:72%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cards{gap:4px;margin-bottom:4px}.card{border-radius:10px;min-height:42px;padding:6px 8px}.card small{display:block;font-size:7.2px;margin:0 0 2px}.card b{font-size:9.6px;line-height:1.18;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .panel{border-radius:12px}.panel-head{padding:6px 8px}.panel-title{font-size:11.2px}.section{padding:6px}.timer{align-items:flex-start;gap:6px;min-height:46px;padding:6px 7px;border-radius:10px}.timer:before{font-size:6.4px;top:-7px}.timer b,.countdown{font-size:10.4px}.timer-right{text-align:right}.timer small{font-size:6.4px}
  .filter-bar{margin-bottom:5px}.filters{gap:4px}.filter{font-size:7.2px;padding:5px 7px;border-radius:8px}.match-row{min-height:50px;gap:7px;padding:6px 7px}.match-row>div{max-width:calc(100% - 56px)}.match-name{font-size:9.6px}.match-status{font-size:7.2px;margin-top:2px}.pill{font-size:6.4px;padding:4px 6px}.lineup-label{min-width:0;margin-right:4px;padding:2px 5px;font-size:.68em}.star-tag{margin-left:4px;padding:1px 5px;font-size:0.952em}.result-line{gap:4px}.result-score{padding:1px 5px}.footer{font-size:6.4px}
  .full-label{display:none}.short-label{display:inline}
}
@media(min-width:601px){.short-label{display:none}.full-label{display:inline}}
</style>
</head>
<body>
<div class="page">
  <div class="topbar">
    <div class="brand"><div class="logo">S</div><div><div class="title">Vipul's Sports Dashboard</div><div class="subtitle" id="subtitle">Football World Cup + Wimbledon</div></div></div>
    <div class="actions">
      <select class="select" id="sportSelect" onchange="changeSport(this.value)">
        <option value="Football">Football World Cup</option>
        <option value="TennisMen">Wimbledon Gentlemen's Singles</option>
        <option value="TennisWomen">Wimbledon Ladies' Singles</option>
      </select>
      <div class="status warn" id="apiStatus">● Loading</div>
      <button class="btn" onclick="loadData()">↻ Refresh</button>
    </div>
  </div>
  <div id="heroMount"></div>
  <div id="cardsMount"></div>
  <div id="mainMount"></div>
  <div class="footer"><div class="footer-left"><span>Auto-refresh every 20 seconds</span><span class="star-legend" id="starLegend"><span class="star-symbol">★</span> Past WC Winner</span></div><div id="updatedAt">Updated: --</div></div>
</div>

<script>
const params=new URLSearchParams(location.search);
let allEvents=[],activeSport=params.get("sport")||"Football",activeFilter=params.get("filter")||"Upcoming",selectedId="",userSelected=false,inFlight=false;
if(activeSport==="All")activeSport="Football";
if(activeFilter==="All")activeFilter="Upcoming";
const $=id=>document.getElementById(id);
const apiBase=location.protocol==="file:"?"http://localhost:3003":"";
const FOOTBALL_STARS=["Brazil","Argentina","Germany","France","Spain","England","Italy","Uruguay"];
const TENNIS_GRAND_SLAM_WINNERS=[
  "Novak Djokovic","Jannik Sinner","Carlos Alcaraz","Daniil Medvedev","Stan Wawrinka","Marin Cilic","Dominic Thiem","Rafael Nadal","Andy Murray",
  "Iga Swiatek","Aryna Sabalenka","Coco Gauff","Elena Rybakina","Barbora Krejcikova","Emma Raducanu","Naomi Osaka","Bianca Andreescu","Sofia Kenin",
  "Sloane Stephens","Jelena Ostapenko","Simona Halep","Angelique Kerber","Petra Kvitova","Victoria Azarenka","Garbine Muguruza","Caroline Wozniacki","Ashleigh Barty"
];

function stateOf(e){return e?.state||"Unknown"}
function parseTime(e){const d=new Date(e?.startISO||0);return Number.isFinite(d.getTime())?d:new Date(0)}
function isTennisGents(e){return e.sport==="Tennis"&&String(e.stage||"").toLowerCase().startsWith("men's singles")}
function isTennisLadies(e){return e.sport==="Tennis"&&String(e.stage||"").toLowerCase().startsWith("women's singles")}
function sportEvents(){if(activeSport==="All")return allEvents;if(activeSport==="TennisMen")return allEvents.filter(isTennisGents);if(activeSport==="TennisWomen")return allEvents.filter(isTennisLadies);return allEvents.filter(e=>e.sport===activeSport)}
function eventLabel(){return activeSport==="Football"?"Football World Cup":activeSport==="TennisMen"?"Wimbledon Gentlemen's Singles":activeSport==="TennisWomen"?"Wimbledon Ladies' Singles":"All Sports"}
function isTennisTab(){return activeSport==="TennisMen"||activeSport==="TennisWomen"}
function subtitleText(){return isTennisTab()?"Live data":eventLabel()+" • Live data"}
function isFuture(e){return stateOf(e)==="Upcoming"&&parseTime(e).getTime()>Date.now()-30*60*1000}
function sortEvents(list){return [...list].sort((a,b)=>{if(stateOf(a)==="Live"!== (stateOf(b)==="Live"))return stateOf(a)==="Live"?-1:1;if(isFuture(a)&&isFuture(b))return parseTime(a)-parseTime(b);if(isFuture(a)!==isFuture(b))return isFuture(a)?-1:1;return parseTime(b)-parseTime(a)})}
function primary(){
  let list=sportEvents();
  if(activeFilter==="Stars")list=starFilterEvents(list);
  const live=list.filter(e=>stateOf(e)==="Live");
  const starLive=live.find(e=>starMatches(e).length);
  const latestFinished=sortEvents(list.filter(e=>stateOf(e)==="Finished"))[0];
  const nextUpcoming=sortEvents(list.filter(isFuture))[0];
  if(activeSport==="Football")return starLive||live[0]||latestFinished||nextUpcoming||list[0];
  if(isTennisTab())return starLive||live[0]||latestFinished||nextUpcoming||list[0];
  return starLive||live[0]||nextUpcoming||latestFinished||list[0];
}
function changeSport(v){activeSport=v;activeFilter="Upcoming";selectedId="";userSelected=false;$("subtitle").textContent=subtitleText();render()}
function setFilter(v){activeFilter=v;render()}
function selectEvent(id){selectedId=id;userSelected=true;render()}
function fmtTime(e){const d=parseTime(e);return d.getTime()?d.toLocaleString([], {weekday:"short", day:"numeric", month:"short", hour:"numeric", minute:"2-digit"}):"TBD"}
function scheduleLabel(e){return e?.synthetic&&!parseTime(e).getTime()?"Schedule TBD":fmtTime(e)}
function countdown(e){const diff=parseTime(e)-Date.now();if(diff<=0)return"Starting now";const s=Math.floor(diff/1000),d=Math.floor(s/86400),h=Math.floor((s%86400)/3600),m=Math.floor((s%3600)/60);return d>=1?`${d}d ${h}h ${m}m`:`${h}h ${m}m`}
function winnerText(e){const winner=(e.teams||[]).find(t=>t.winner);return winner?`${winner.short||winner.name} ${resultMethod(e)} ${e.scoreText?`• ${e.scoreText}`:""}`:(stateOf(e)==="Finished"?"Finished":"In progress")}
function resultMethod(e){return /pens|penalties|shoot/i.test(`${e.status||""} ${e.detail||""}`)?"won on penalties":"won"}
function winnerGoalCount(e,winner){
  const direct=Number(winner?.score);
  if(Number.isFinite(direct))return String(direct);
  const label=String(winner?.short||winner?.name||"").replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
  const found=String(e?.scoreText||"").match(new RegExp(`${label}\\s+(\\d+)`,"i"));
  return found?.[1]||"";
}
function footballResultScoreline(e){
  const teams=(e.teams||[]).slice(0,2);
  if(teams.length>=2){
    const ordered=[...teams].sort((a,b)=>(b.winner?1:0)-(a.winner?1:0));
    return ordered.map(t=>`${t.short||t.name} ${Number.isFinite(Number(t.score))?t.score:"--"}`).join(" : ");
  }
  return e.scoreText||"";
}
function tennisFinalScoreline(e,winner){
  const teams=(e.teams||[]).slice(0,2);
  if(teams.length<2)return e.scoreText||"";
  const loser=teams.find(t=>t!==winner)||teams.find(t=>!t.winner)||teams[1];
  const winSets=tennisSetList(winner),loseSets=tennisSetList(loser);
  const setScores=winSets.map((v,i)=>{
    const a=String(v||"").trim(),b=String(loseSets[i]||"").trim();
    return a&&b?`${a}-${b}`:"";
  }).filter(Boolean);
  return setScores.length?setScores.join(", "):(e.scoreText||"");
}
function resultSummary(e){
  const winner=(e.teams||[]).find(t=>t.winner);
  if(stateOf(e)!=="Finished"||!winner)return e.scoreText||displayStatus(e);
  if(e.sport==="Football"){
    return `<span class="result-line"><span class="result-winner football-winner">${winner.short||winner.name}</span><span class="result-method football-method">${resultMethod(e)}:</span><span class="result-score blink-result">${footballResultScoreline(e)}</span></span>`;
  }
  if(e.sport==="Tennis"){
    return `<span class="result-line"><span class="result-winner">${tennisPlainName(winner)}</span><span class="result-method">${resultMethod(e)}:</span><span class="result-score blink-result">${tennisFinalScoreline(e,winner)}</span></span>`;
  }
  return `<span class="result-line"><span class="result-winner">${winner.short||winner.name}</span><span class="result-method">${resultMethod(e)}:</span><span class="result-score">${e.scoreText||""}</span></span>`;
}
function tennisPlainName(t){return String(t?.short||t?.name||"Player").replace(/^\[[^\]]+\]\s*/,"").trim()}
function ordinal(n){const v=Number(n)||1;return v===1?"1st":v===2?"2nd":v===3?"3rd":`${v}th`}
function tennisLiveSummary(e){
  if(e?.sport!=="Tennis"||stateOf(e)!=="Live")return "";
  const teams=(e.teams||[]).slice(0,2);
  if(teams.length<2)return "Mtch live";
  const sets=teams.map(tennisSetList);
  const current=Math.max(1,...sets.map(s=>s.length));
  const a=tennisSetValue(sets[0][current-1]),b=tennisSetValue(sets[1][current-1]);
  const setLabel=`${ordinal(current)} set`;
  if(Number.isFinite(a)&&Number.isFinite(b)){
    if(a===b)return `${setLabel}, tied ${a}-${b}`;
    const leader=a>b?teams[0]:teams[1],hi=Math.max(a,b),lo=Math.min(a,b);
    return `${setLabel}, ${tennisPlainName(leader)} leads ${hi}-${lo}`;
  }
  return `${setLabel}, mtch live`;
}
function tennisStatusLabel(e){
  if(e?.sport!=="Tennis")return "";
  if(stateOf(e)==="Live")return tennisLiveSummary(e)||"Mtch live";
  if(stateOf(e)==="Upcoming")return `Starts ${scheduleLabel(e)}`;
  return e.status||"Finished";
}

$("subtitle").textContent=subtitleText();loadData();setInterval(loadData,20000);setInterval(render,1000);
</script>
